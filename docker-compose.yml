version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: swiftdrop
      POSTGRES_PASSWORD: swiftdroppass
      POSTGRES_DB: swiftdrop
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend-1:
    build: ./backend
    container_name: swiftdrop-backend
    environment:
      - DATABASE_URL=postgresql://swiftdrop:swiftdroppass@postgres:5432/swiftdrop
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecret
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  backend-2:
    build: ./backend
    container_name: swiftdrop-backend-2
    environment:
      - DATABASE_URL=postgresql://swiftdrop:swiftdroppass@postgres:5432/swiftdrop
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecret
      - PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: swiftdrop-frontend
    environment:
      - VITE_API_URL=http://localhost/api
    ports:
      - "5173:5173"
    depends_on:
      - backend-1
      - backend-2

  nginx:
    image: nginx:alpine
    container_name: swiftdrop-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - frontend

volumes:
  pgdata:
